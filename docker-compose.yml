version: "3.9"

services:
  backend:
    build:
      context: /Users/shk/experiments/skeptik/backend
    env_file:
      - /Users/shk/experiments/skeptik/backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: /Users/shk/experiments/skeptik/frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
